# ============================================================================
# Starship — Prompt minimalista
# ~/.config/starship.toml
# ============================================================================

format = """
$directory$git_branch$git_status$golang$python$nodejs$rust$terraform$aws$cmd_duration
$character"""

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"

[directory]
style = "blue bold"
truncate_to_repo = true
truncation_length = 3

[git_branch]
symbol = " "
style = "green"

[git_status]
style = "red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"

[golang]
symbol = " "
style = "cyan"

[python]
symbol = " "
style = "yellow"

[nodejs]
symbol = " "
style = "green"

[rust]
symbol = " "
style = "red"

[terraform]
symbol = "󱁢 "
style = "purple"

[aws]
symbol = " "
style = "yellow"

[cmd_duration]
min_time = 2000
style = "yellow dimmed"
format = " [$duration]($style)"

[line_break]
disabled = true
